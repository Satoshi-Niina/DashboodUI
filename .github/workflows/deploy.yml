name: Deploy to Cloud Run

on:
  push:
    branches: 
      - main
      - master
  workflow_dispatch:  # 手動実行も可能

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast2
  SERVICE_NAME: dashboard-ui
  CLOUD_SQL_INSTANCE: ${{ secrets.CLOUD_SQL_INSTANCE }}  # 例: project:region:instance

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Google Cloud Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          create_credentials_file: true
          export_environment_variables: true
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate required secrets
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          CLOUD_SQL_INSTANCE: ${{ secrets.CLOUD_SQL_INSTANCE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          URL_FAILURE: ${{ secrets.URL_FAILURE }}
          URL_PLANNING: ${{ secrets.URL_PLANNING }}
        run: |
          for key in GCP_PROJECT_ID GCP_SA_KEY CLOUD_SQL_INSTANCE DB_USER DB_PASSWORD DB_NAME JWT_SECRET URL_FAILURE URL_PLANNING; do
            if [ -z "${!key}" ]; then
              echo "ERROR: Required secret '$key' is not set"
              exit 1
            fi
          done

      - name: Verify gcloud auth context
        run: |
          gcloud config set project ${{ env.PROJECT_ID }}
          gcloud auth list
      
      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io,us.gcr.io,asia.gcr.io --quiet

      - name: Docker login with GCP access token
        run: |
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          echo "$ACCESS_TOKEN" | docker login -u oauth2accesstoken --password-stdin https://gcr.io
          echo "$ACCESS_TOKEN" | docker login -u oauth2accesstoken --password-stdin https://us.gcr.io
          echo "$ACCESS_TOKEN" | docker login -u oauth2accesstoken --password-stdin https://asia.gcr.io
      
      - name: Clear Docker Cache
        run: |
          echo "🧹 Clearing Docker build cache..."
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "✅ Docker cache cleared"
      
      - name: Delete old container images
        run: |
          echo "🗑️ Deleting old container images from GCR..."
          gcloud container images list --repository=gcr.io/${{ env.PROJECT_ID }} --format="value(name)" | while read IMAGE_NAME; do
            echo "Processing $IMAGE_NAME..."
            gcloud container images list-tags "$IMAGE_NAME" --format="get(digest)" --limit=999 | while read DIGEST; do
              if [ ! -z "$DIGEST" ]; then
                echo "Deleting $IMAGE_NAME@$DIGEST"
                gcloud container images delete "${IMAGE_NAME}@${DIGEST}" --quiet --force-delete-tags || true
              fi
            done
          done
          echo "✅ Old images deleted"
      
      - name: Verify Cloud SQL Instance Name
        run: |
          INSTANCE="${{ secrets.CLOUD_SQL_INSTANCE }}"
          echo "Cloud SQL Instance: $INSTANCE"
          if [[ -z "$INSTANCE" ]]; then
            echo "ERROR: CLOUD_SQL_INSTANCE secret is not set!"
            exit 1
          fi
          if [[ ! "$INSTANCE" =~ ^[a-zA-Z0-9-]+:[a-zA-Z0-9-]+:[a-z][a-z0-9-]+$ ]]; then
            echo "ERROR: Invalid Cloud SQL instance format. Expected: project-id:region:instance-name"
            echo "Got: $INSTANCE"
            exit 1
          fi
      
      - name: Build and Deploy to Cloud Run (Clean Build)
        id: deploy
        run: |
          # タイムスタンプでイメージタグを生成（キャッシュ無効化）
          TIMESTAMP=$(date +%s)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE_TAG="gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${TIMESTAMP}-${SHORT_SHA}"
          
          echo "🔨 Building Docker image with timestamp: $TIMESTAMP"
          echo "🚫 Cache disabled: --no-cache"
          echo "📦 Image tag: $IMAGE_TAG"
          echo "📌 Short SHA: $SHORT_SHA"
          
          # Dockerイメージをビルド（完全にキャッシュ無効化）
          docker build \
            --no-cache \
            --pull \
            --build-arg CACHEBUST=$TIMESTAMP \
            --build-arg BUILDTIME=$(date -Iseconds) \
            -t $IMAGE_TAG .
          
          echo "✅ Build completed"
          
          # GCRにプッシュ
          echo "📤 Pushing to GCR..."
          docker push $IMAGE_TAG
          echo "✅ Push completed"
          
          # Cloud Runにデプロイ
          # 注意: --tagオプションは使用しない（サービス名+タグで46文字制限あり）
          echo "🚀 Deploying to Cloud Run..."
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=$IMAGE_TAG \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE }} \
            --set-env-vars="NODE_ENV=production" \
            --set-env-vars="APP_ID=dashboard-ui" \
            --set-env-vars="CLOUD_SQL_INSTANCE=${{ secrets.CLOUD_SQL_INSTANCE }}" \
            --set-env-vars="DB_USER=${{ secrets.DB_USER }}" \
            --set-env-vars="DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --set-env-vars="DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars="JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars="CORS_ORIGIN=*" \
            --set-env-vars="URL_PLANNING=${{ secrets.URL_PLANNING }}" \
            --set-env-vars="URL_PLANNING_API=https://operation-management-server-800711608362.asia-northeast2.run.app" \
            --set-env-vars="URL_FAILURE=${{ secrets.URL_FAILURE }}" \
            --set-env-vars="BUILD_TIMESTAMP=$TIMESTAMP" \
            --min-instances=0 \
            --max-instances=10 \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600
          
          echo "✅ Deployment completed with timestamp: $TIMESTAMP"
      
      - name: Clear CDN/Edge Cache
        run: |
          echo "🧹 Forcing cache invalidation..."
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          
          # Cloud RunのCDNキャッシュをクリア（複数リクエスト）
          for endpoint in / /admin.html /admin.js /admin.css /index.html /app.js /login.js; do
            echo "Clearing cache for: $endpoint"
            curl -X PURGE "${SERVICE_URL}${endpoint}" || true
            curl -H "Cache-Control: no-cache" "${SERVICE_URL}${endpoint}" > /dev/null 2>&1 || true
          done
          
          echo "✅ Cache invalidation completed"
      
      - name: Show logs on deployment failure
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          echo "Deployment failed, fetching logs..."
          echo "==================== CLOUD RUN LOGS ===================="
          gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=${{ env.SERVICE_NAME }}" \
            --limit=100 \
            --format="table(timestamp,severity,textPayload)" \
            --project=${{ env.PROJECT_ID }} \
            --freshness=5m || echo "Failed to fetch logs"
      
      - name: Test Health Endpoint
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          echo "Testing health endpoint..."
          
          # サービス起動を待つ（最大60秒）
          MAX_WAIT=60
          WAIT_TIME=0
          while [ $WAIT_TIME -lt $MAX_WAIT ]; do
            if curl -f -s "$SERVICE_URL/health" > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              curl "$SERVICE_URL/health"
              break
            fi
            echo "Waiting for service to be ready... ($WAIT_TIME/$MAX_WAIT)"
            sleep 5
            WAIT_TIME=$((WAIT_TIME + 5))
          done
          
          if [ $WAIT_TIME -ge $MAX_WAIT ]; then
            echo "⚠️ Health check timeout, checking logs..."
            gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=${{ env.SERVICE_NAME }}" \
              --limit=50 \
              --format=json \
              --project=${{ env.PROJECT_ID }} || true
          fi
      
      - name: Verify deployed files
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          
          echo "🔍 Verifying deployed admin.js contains data-action..."
          RESULT=$(curl -s "${SERVICE_URL}/admin.js" | grep -c "data-action" || echo "0")
          echo "data-action count in deployed file: $RESULT"
          
          if [ "$RESULT" -lt "3" ]; then
            echo "❌ ERROR: admin.js does not contain enough data-action attributes!"
            echo "Expected at least 3, got: $RESULT"
            exit 1
          fi
          
          echo "✅ Verification passed: admin.js contains $RESULT data-action attributes"
      
      - name: Show Deployment Info
        run: |
          echo "✅ Deployment completed successfully!"
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "🌐 Service URL: $SERVICE_URL"
          echo "🔍 Health Check: $SERVICE_URL/health"
          echo "🐛 Debug Info: $SERVICE_URL/debug/env"
